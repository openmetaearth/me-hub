before:
  hooks:
    - go mod download

builds:
  - id: "med-darwin"
    main: ./cmd/med
    binary: med
    env:
      - CGO_ENABLED=1
      - CC=o64-clang
      - CXX=o64-clang++
    goos:
      - darwin
    goarch:
      - amd64
    flags:
      - -tags=cgo netgo ledger
      - -trimpath
    ldflags:
      - -s -w -X github.com/cosmos/cosmos-sdk/version.Name=me -X github.com/cosmos/cosmos-sdk/version.AppName=med -X github.com/cosmos/cosmos-sdk/version.Version={{.Version}} -X github.com/cosmos/cosmos-sdk/version.Commit={{.Commit}}
  - id: "med-darwin-arm64"
    main: ./cmd/med
    binary: med
    env:
      - CGO_ENABLED=1
      - CC=oa64-clang
      - CXX=oa64-clang++
    goos:
      - darwin
    goarch:
      - arm64
    flags:
      - -tags=cgo netgo ledger
      - -trimpath
    ldflags:
      - -s -w -X github.com/cosmos/cosmos-sdk/version.Name=me -X github.com/cosmos/cosmos-sdk/version.AppName=med -X github.com/cosmos/cosmos-sdk/version.Version={{.Version}} -X github.com/cosmos/cosmos-sdk/version.Commit={{.Commit}}
  - id: "med-linux"
    main: ./cmd/med
    binary: med
    env:
      - CGO_ENABLED=1
      - CC=gcc
      - CXX=g++
    goos:
      - linux
    goarch:
      - amd64
    flags:
      - -tags=cgo
    ldflags:
      - -s -w -X github.com/cosmos/cosmos-sdk/version.Name=dymension -X github.com/cosmos/cosmos-sdk/version.AppName=med -X github.com/cosmos/cosmos-sdk/version.Version={{.Version}} -X github.com/cosmos/cosmos-sdk/version.Commit={{.Commit}}
  - id: "med-linux-arm64"
    main: ./cmd/med
    binary: med
    env:
      - CGO_ENABLED=1
      - CC=aarch64-linux-gnu-gcc
      - CXX=aarch64-linux-gnu-g++
    goos:
      - linux
    goarch:
      - arm64
    flags:
      - -tags=cgo netgo ledger
      - -trimpath
    ldflags:
      - -s -w -X github.com/cosmos/cosmos-sdk/version.Name=me -X github.com/cosmos/cosmos-sdk/version.AppName=med -X github.com/cosmos/cosmos-sdk/version.Version={{.Version}} -X github.com/cosmos/cosmos-sdk/version.Commit={{.Commit}}
  - id: "med-windows"
    main: ./cmd/med
    binary: med
    env:
      - CGO_ENABLED=1
      - CC=x86_64-w64-mingw32-gcc
      - CXX=x86_64-w64-mingw32-g++
    goos:
      - windows
    goarch:
      - amd64
    flags:
      - -tags=cgo netgo ledger
      - -trimpath
      - -buildmode=exe
    ldflags:
      - -s -w -X github.com/cosmos/cosmos-sdk/version.Name=me -X github.com/cosmos/cosmos-sdk/version.AppName=med -X github.com/cosmos/cosmos-sdk/version.Version={{.Version}} -X github.com/cosmos/cosmos-sdk/version.Commit={{.Commit}}

archives:
  - name_template: '{{ .ProjectName }}_{{ .Version }}_{{- title .Os }}_{{ .Arch }}'
    format_overrides:
      - goos: windows
        format: zip
    builds:
      - med-darwin
      - med-darwin-arm64
      - med-windows
      - med-linux
      - med-linux-arm64
  
checksum:
  name_template: SHA256SUMS-v{{.Version}}.txt
  algorithm: sha256

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
snapshot:
  name_template: "{{ .Tag }}-next"

release:
  draft: true
  replace_existing_draft: true
  prerelease: auto
  mode: keep-existing
  header: |
    # me {{ .Tag }} Release Notes
  footer: |
    ## 🔨 Build from source
    
    ```bash
    git clone https://github.com/st-chain/me-hub.git
    cd me-hub && git checkout {{ .Tag }}
    make install
    ```
    
    ## 🐳 Docker Images
    
    ```bash
    docker pull ghcr.io/st-chain/me-hub:{{ .Version }}
    ```
    
    ```bash
    docker pull ghcr.io/st-chain/mevisor:{{ .Version }}
    ```
    
    ## ⚡️ Download binaries
    
    Binaries for linux, darwin, and windows are available below.