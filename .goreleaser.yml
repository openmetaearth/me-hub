project_name: med

version: 2

before:
  hooks:
    - go mod download
    - go mod tidy
    - apt-get update && apt-get install -y libmvec-dev musl-dev=1.2.2-1

env:
  - CGO_ENABLED=1

builds:
  - id: "med-darwin-amd64"
    main: ./cmd/med/main.go
    binary: med
    hooks:
      pre:
        - wget https://github.com/CosmWasm/wasmvm/releases/download/{{ .Env.COSMWASM_VERSION }}/libwasmvmstatic_darwin.a -O /lib/libwasmvmstatic_darwin.a
    env:
      - CC=o64-clang
      - CXX=o64-clang++
      - CGO_LDFLAGS=-L/lib -mmacosx-version-min=10.12
      - CGO_CFLAGS=-mmacosx-version-min=10.12
    goos:
      - darwin
    goarch:
      - amd64
    flags:
      - -mod=readonly
      - -trimpath
    ldflags:
      - -X github.com/cosmos/cosmos-sdk/version.Name=me-hub
      - -X github.com/cosmos/cosmos-sdk/version.AppName=med
      - -X github.com/cosmos/cosmos-sdk/version.Version={{.Version}}
      - -X github.com/cosmos/cosmos-sdk/version.Commit={{.Commit}}
      - -X github.com/cosmos/cosmos-sdk/version.BuildTags=netgo,ledger,static_wasm
      - -s -w
      - -linkmode=external
    tags:
      - netgo
      - ledger
      - static_wasm

  - id: "med-darwin-arm64"
    main: ./cmd/med/main.go
    binary: med
    hooks:
      pre:
        - wget https://github.com/CosmWasm/wasmvm/releases/download/{{ .Env.COSMWASM_VERSION }}/libwasmvmstatic_darwin.a -O /lib/libwasmvmstatic_darwin.a
    env:
      - CC=oa64-clang
      - CXX=oa64-clang++
      - CGO_LDFLAGS=-L/lib
    goos:
      - darwin
    goarch:
      - arm64
    flags:
      - -mod=readonly
      - -trimpath
    ldflags:
      - -X github.com/cosmos/cosmos-sdk/version.Name=me-hub
      - -X github.com/cosmos/cosmos-sdk/version.AppName=med
      - -X github.com/cosmos/cosmos-sdk/version.Version={{.Version}}
      - -X github.com/cosmos/cosmos-sdk/version.Commit={{.Commit}}
      - -X github.com/cosmos/cosmos-sdk/version.BuildTags=netgo,ledger,static_wasm
      - -s -w
      - -linkmode=external
    tags:
      - netgo
      - ledger
      - static_wasm

  - id: "med-linux-amd64"
    main: ./cmd/med
    binary: med
    hooks:
      pre:
        - wget https://github.com/CosmWasm/wasmvm/releases/download/{{ .Env.COSMWASM_VERSION }}/libwasmvm_muslc.x86_64.a -O /lib/libwasmvm_muslc.x86_64.a
        - cp /lib/libwasmvm_muslc.x86_64.a /lib/libwasmvm_muslc.a
        - curl -LO https://musl.cc/x86_64-linux-musl-cross.tgz
        - tar xf x86_64-linux-musl-cross.tgz
        - mv x86_64-linux-musl-cross /opt/musl-cross
    env:
      - CC=/opt/musl-cross/bin/x86_64-linux-musl-gcc
      - LD=/opt/musl-cross/bin/x86_64-linux-musl-ld
      - CGO_LDFLAGS=-L/lib
    goos:
      - linux
    goarch:
      - amd64
    flags:
      - -mod=readonly
      - -trimpath
    ldflags:
      - -X github.com/cosmos/cosmos-sdk/version.Name=me-hub
      - -X github.com/cosmos/cosmos-sdk/version.AppName=med
      - -X github.com/cosmos/cosmos-sdk/version.Version={{.Version}}
      - -X github.com/cosmos/cosmos-sdk/version.Commit={{.Commit}}
      - -X github.com/cosmos/cosmos-sdk/version.BuildTags=netgo,ledger,muslc,osusergo
      - -s -w
      - -linkmode=external
      - -extldflags "-Wl,-z,muldefs -static"
    tags:
      - netgo
      - ledger
      - muslc
      - osusergo

