universal_binaries:
  - id: med-darwin-universal
    ids:
      - med-darwin-arm64
      - med-darwin-amd64
    replace: false
  - id: med-linux-universal
    ids:
      - med-linux-amd64
    replace: false

archives:
  - id: zipped
    builds:
      - med-darwin-amd64
      - med-darwin-arm64
      - med-linux-amd64
    name_template: "{{.ProjectName}}-{{ .Version }}-{{ .Os }}-{{ .Arch }}"
    format: tar.gz
    files:
      - none*
#  - id: binaries
#    builds:
#      - med-darwin-amd64
#      - med-darwin-arm64
#      - med-linux-amd64
#    name_template: "{{.ProjectName}}-{{ .Version }}-{{ .Os }}-{{ .Arch }}"
#    format: binary
#    files:
#      - none*

checksum:
  name_template: SHA256SUMS-v{{.Version}}.txt
  algorithm: sha256

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
snapshot:
  name_template: "{{ .Tag }}-next"

release:
  draft: false
  replace_existing_draft: true
  prerelease: false
  mode: keep-existing
  header: |
    # me-hub {{ .Tag }} Release Notes
  footer: |
    ## 🔨 Build from source
    
    ```bash
    git clone https://github.com/openmetaearth/me-hub.git
    cd me-hub && git checkout {{ .Tag }}
    make install
    ```
    
    ## 🐳 Docker Images
    
    As an alternative to installing and running med on your system, you may run med in a Docker container.

    ```bash
    docker pull ghcr.io/openmetaearth/me-hub:{{ .Version }}
    ```
 
    Example run:

    ```bash
    docker run ghcr.io/openmetaearth/me-hub:{{ .Version }} version
    # v{{ .Version }}
    ````
    
    ## ⚡️ Download binaries
    
    Binaries for linux, darwin are available below.