name: Release

on:
  push:
    tags:
      - "v[0-9]+\\.[0-9]+\\.[0-9]+"
      - "v[0-9]+\\.[0-9]+\\.[0-9]+-rc[0-9]+"
      - "v[0-9]+\\.[0-9]+\\.[0-9]+-testnet[0-9]+"

permissions: write-all

jobs:
  release:
    name: Create release
    runs-on: b2-local
    environment: release
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch tags
        run: git fetch --force --tags

      - name: Generate release note
        run: |
          chmod +x ./scripts/release-note.sh
          ./scripts/release-note.sh ${GITHUB_REF#refs/*/}

      - name: Setup release environment
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo 'GITHUB_TOKEN=${{secrets.GITHUB_TOKEN}}' > .release-env
          echo 'GONOSUMDB=github.com/st-chain/*' > .release-env
          echo 'GOPRIVATE=github.com/st-chain/*' > .release-env

      - name: Configure GitHub token for Go modules
        run: |
          echo "machine github.com login ${{ secrets.GITHUB_TOKEN }}" > ~/.netrc
          echo "machine api.github.com login ${{ secrets.GITHUB_TOKEN }}" >> ~/.netrc

      - name: Release publish
        run: make release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 🧹 Clean release folder
        run: |
          sudo rm -rf dist