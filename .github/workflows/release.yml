name: Release

on:
  push:
    tags:
      - "v[0-9]+\\.[0-9]+\\.[0-9]+"
      - "v[0-9]+\\.[0-9]+\\.[0-9]+-rc[0-9]+"
      - "v[0-9]+\\.[0-9]+\\.[0-9]+-testnet[0-9]+"

permissions: write-all

jobs:
  release:
    name: Create release
    runs-on: ubuntu-latest
    environment: release
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch tags
        run: git fetch --force --tags

      - name: Check for gcc
        run: |
          if ! command -v gcc &> /dev/null
          then
            echo "gcc not installed. Installing gcc..."
            sudo apt update
            sudo apt install gcc g++ make
          else
            echo "gcc is already installed."
          fi

      - name: Generate release note
        run: |
          chmod +x ./scripts/release-note.sh
          ./scripts/release-note.sh ${GITHUB_REF#refs/*/}

      - name: Setup release environment
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo 'GITHUB_TOKEN=${{secrets.GITHUB_TOKEN}}' > .release-env
          echo 'GONOSUMDB=github.com/st-chain/*' > .release-env
          echo 'GOPRIVATE=github.com/st-chain/*' > .release-env

      - name: Release publish
        run: make release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 🧹 Clean release folder
        run: |
          sudo rm -rf dist