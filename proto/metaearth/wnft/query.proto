syntax = "proto3";
package metaearth.wnft;

import "cosmos/base/query/v1beta1/pagination.proto";
import "cosmos_proto/cosmos.proto";
import "gogoproto/gogo.proto";
import "google/api/annotations.proto";

option go_package = "github.com/openmetaearth/me-hub/x/wnft/types";

// Query defines the gRPC querier service.
service Query {
  // Classes queries Address
  rpc ClassAddress(QueryClassAddressRequest) returns (QueryClassAddressResponse) {
    option (google.api.http).get = "/metaearth/wnft/class_address/{address}/{class_id}";
  }

  //  queries nft filter
  rpc NftFilter(QueryNftFilterRequest) returns (QueryNftFilterResponse) {
    option (google.api.http) = {
      post: "/metaearth/wnft/nft_filter"
      body: "*"
    };
  }
}

// QueryClassRequest is the request type for the Query/Class RPC method
message QueryClassAddressRequest {
  // class_id associated with the nft
  string class_id = 1;

  string address = 2;
}

// QueryClassesResponse is the response type for the Query/Classes RPC method
message QueryClassAddressResponse {
  bool exists = 1;

  uint64 total_supply = 2;

  repeated string nfts = 3;
}

// QueryNftFilterResponse is the request type for the Query/NftFilter RPC method
message QueryNftFilterRequest {
  string owner = 1;

  string class_id = 2;

  string token_id = 3;
}

// QueryNftFilterResponse is the response type for the Query/NftFilter RPC
// method
message QueryNftFilterResponse {
  repeated NftList nfts = 1;
}

message NftList {
  string class_id = 1;

  string token_id = 2;

  string uri = 3;

  string owner = 4;
}
