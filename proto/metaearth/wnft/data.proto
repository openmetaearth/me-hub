syntax = "proto3";
package metaearth.wnft;

import "gogoproto/gogo.proto";

option go_package = "github.com/st-chain/me-hub/x/wnft/types";

message Extension {
  option (gogoproto.equal) = true;

  string data = 1;
}

message ClassMetadata {
  option (gogoproto.equal) = true;

  string creator = 1;
}
