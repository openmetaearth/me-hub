syntax = "proto3";
package metaearth.wnft;

import "cosmos/msg/v1/msg.proto";
import "cosmos_proto/cosmos.proto";

option go_package = "github.com/openmetaearth/me-hub/x/wnft/types";

// Msg defines the nft Msg service.
service Msg {
  option (cosmos.msg.v1.service) = true;

  // NewClass defines a method to new class.
  rpc NewClass(MsgNewClass) returns (MsgNewClassResponse);

  // MintNFT defines a method to new nft.
  rpc MintNFT(MsgMintNFT) returns (MsgMintNFTResponse);

  // Send defines a method to send a nft from one account to another account.
  rpc Send(MsgSend) returns (MsgSendResponse);
}

message MsgNewClass {
  option (cosmos.msg.v1.signer) = "sender";

  // class_id defines the unique identifier of the nft classification, similar
  // to the contract address of ERC721
  string class_id = 1;

  uint64 total_supply = 2;

  // sender is the address of the owner of nft
  string sender = 3 [(cosmos_proto.scalar) = "cosmos.AddressString"];

  string name = 4;

  string symbol = 5;

  // description is a brief description of nft classification. Optional
  string description = 6;

  // uri for the class metadata stored off chain. It can define schema for Class
  // and NFT `Data` attributes. Optional
  string uri = 7;

  // uri_hash is a hash of the document pointed by uri. Optional
  string uri_hash = 8;
}

// MsgNewClassResponse defines the Msg/NewClass response type.
message MsgNewClassResponse {}

message MsgMintNFT {
  option (cosmos.msg.v1.signer) = "creator";

  // class_id defines the unique identifier of the nft classification, similar
  // to the contract address of ERC721
  string class_id = 1;

  string token_id = 2;

  string uri = 3;

  // uri_hash is a hash of the document pointed by uri
  string uri_hash = 4;

  // creator is the address of the owner of nft class.
  string creator = 5 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  string receiver = 6 [(cosmos_proto.scalar) = "cosmos.AddressString"];
}

// MsgMintResponse defines the Msg/Mint response type.
message MsgMintNFTResponse {}

// MsgSend represents a message to send a nft from one account to another
// account.
message MsgSend {
  option (cosmos.msg.v1.signer) = "sender";

  // class_id defines the unique identifier of the nft classification, similar
  // to the contract address of ERC721
  string class_id = 1;

  // id defines the unique identification of nft
  string id = 2;

  // sender is the address of the owner of nft
  string sender = 3 [(cosmos_proto.scalar) = "cosmos.AddressString"];

  // receiver is the receiver address of nft
  string receiver = 4 [(cosmos_proto.scalar) = "cosmos.AddressString"];
}

// MsgSendResponse defines the Msg/Send response type.
message MsgSendResponse {}
