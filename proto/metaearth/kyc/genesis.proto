syntax = "proto3";
package metaearth.kyc;

import "gogoproto/gogo.proto";
import "metaearth/did/did.proto";
import "metaearth/kyc/kyc_event_seq.proto";
import "metaearth/kyc/protocol.proto";

option go_package = "github.com/openmetaearth/me-hub/x/kyc/types";

// GenesisState defines the kyc module's genesis state.
message GenesisState {
  repeated did.DidInfo issuers = 1 [(gogoproto.nullable) = false];
  KycEventSeq kycEventSeq = 2;
}
