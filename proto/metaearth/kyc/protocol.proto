syntax = "proto3";
package metaearth.kyc;

import "cosmos_proto/cosmos.proto";
import "gogoproto/gogo.proto";
import "metaearth/did/issuer.proto";

option go_package = "github.com/openmetaearth/me-hub/x/kyc/types";

message Region {
  string id = 1;
  string name = 2;
  repeated string authType = 3;
}

message Protocol {
  did.Service service = 1 [(gogoproto.nullable) = false];
  repeated Region regions = 2 [(gogoproto.nullable) = false];
}
