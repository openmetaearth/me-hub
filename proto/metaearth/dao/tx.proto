syntax = "proto3";
package metaearth.dao;

import "cosmos/msg/v1/msg.proto";
import "gogoproto/gogo.proto";
import "metaearth/dao/dao.proto";

// this line is used by starport scaffolding # proto/tx/import

option go_package = "github.com/openmetaearth/me-hub/x/dao/types";

// Msg defines the Msg service.
service Msg {
  rpc UpdateDao(MsgUpdateDao) returns (MsgUpdateDaoResponse);
  rpc FreeGasAccount(MsgFreeGasAccount) returns (MsgFreeGasAccountResponse);
}

message MsgUpdateDao {
  option (cosmos.msg.v1.signer) = "creator";
  string creator = 1;
  DaoAddresses dao_addresses = 2 [(gogoproto.nullable) = false];
}

message MsgUpdateDaoResponse {}

message MsgFreeGasAccount {
  option (cosmos.msg.v1.signer) = "creator";
  string creator = 1;
  repeated FreeGasAccount accounts = 2 [(gogoproto.nullable) = false];
}

message FreeGasAccount {
  string address = 1;
  bool is_free = 2;
}

message MsgFreeGasAccountResponse {}
