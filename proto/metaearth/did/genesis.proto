syntax = "proto3";
package metaearth.did;

import "gogoproto/gogo.proto";
import "metaearth/did/credential.proto";
import "metaearth/did/did.proto";
import "metaearth/did/filter.proto";
import "metaearth/did/issuer.proto";

option go_package = "github.com/openmetaearth/me-hub/x/did/types";

// GenesisState defines the kyc module's genesis state.
message GenesisState {
  repeated did.DidInfo infos = 1 [(gogoproto.nullable) = false];
  repeated did.Service svcs = 2 [(gogoproto.nullable) = false];
  repeated did.Credential vcs = 3 [(gogoproto.nullable) = false];
  repeated did.FilterLogger flogs = 4 [(gogoproto.nullable) = false];
}
