syntax = "proto3";
package metaearth.did;

option go_package = "github.com/openmetaearth/me-hub/x/did/types";

// verifiable credential
message Credential {
  string did = 1;
  string sid = 2;
  string hash = 3;
  string uri = 4;
  // data is an app specific data of the credential. Optional
  bytes data = 5;
}
