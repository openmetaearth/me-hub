syntax = "proto3";
package metaearth.did;

option go_package = "github.com/st-chain/me-hub/x/did/types";

// verifiable credential
message Credential {
  string did        = 1;  // MEIDNFT.umeid
  string sid        = 2;  // MEID.creator
  string hash       = 3;
  string uri        = 4;
  // data is an app specific data of the credential. Optional
  bytes data        = 5;  // MEID.regionId
}