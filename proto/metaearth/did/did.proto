syntax = "proto3";
package metaearth.did;

import "gogoproto/gogo.proto";
import "cosmos_proto/cosmos.proto";
import "google/protobuf/timestamp.proto";
import "metaearth/did/credential.proto";

option go_package = "github.com/st-chain/me-hub/x/did/types";


// did status enum
enum DidStatus {
  option (gogoproto.goproto_enum_stringer) = true;
  option (gogoproto.goproto_enum_prefix) = false;

  DID_STATUS_DEACTIVE    = 0 [ (gogoproto.enumvalue_customname) = "DID_STATUS_DEACTIVE " ];
  DID_STATUS_ACTIVE      = 1 [ (gogoproto.enumvalue_customname) = "DID_STATUS_ACTIVE" ];
}


message DidInfo {
  // same as the MEID
  string did             = 1;  //MEIDNFT.umeid
  string address         = 2 [(cosmos_proto.scalar) = "cosmos.AddressString"];  //MEID.account
  // public_key is mapped to the user address
  // the issuer will use public_key to encrypt the user's certificate to ensure the privacy of the off-chain certificate
  string pubkey          = 3;
  DidStatus status       = 4;  //写死 DID_STATUS_ACTIVE
}

// did document
message DidDocument {
  DidInfo info = 1 [(gogoproto.nullable) = false];
  repeated Credential vcs = 2 [(gogoproto.nullable) = false];
}
