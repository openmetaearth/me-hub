syntax = "proto3";
package metaearth.did;

import "cosmos/msg/v1/msg.proto";
import "cosmos_proto/cosmos.proto";
import "gogoproto/gogo.proto";
import "metaearth/did/did.proto";
import "metaearth/did/filter.proto";
import "metaearth/did/issuer.proto";

option go_package = "github.com/openmetaearth/me-hub/x/did/types";

// Msg defines the Msg service.
service Msg {
  option (cosmos.msg.v1.service) = true;

  rpc CreateDid(MsgCreateDid) returns (MsgCreateDidResponse);
  rpc UpdateDidStatus(MsgUpdateDidStatus) returns (MsgUpdateDidStatusResponse);
  //  rpc RemoveDid(MsgRemoveDid) returns (MsgRemoveDidResponse);

  rpc CreateService(MsgCreateService) returns (MsgCreateServiceResponse);
  rpc UpdateServiceStatus(MsgUpdateServiceStatus) returns (MsgUpdateServiceStatusResponse);
  //  rpc RemoveService(MsgRemoveService) returns (MsgRemoveServiceResponse);

  rpc CreateVC(MsgCreateVC) returns (MsgCreateVCResponse);
  rpc UpdateVC(MsgUpdateVC) returns (MsgUpdateVCResponse);
  rpc RemoveVC(MsgRemoveVC) returns (MsgRemoveVCResponse);
}

message MsgCreateDid {
  string creator = 1;
  string did = 2;
  string address = 3;
  string pubkey = 4;
}

message MsgCreateDidResponse {}

message MsgUpdateDidStatus {
  string creator = 1;
  string did = 2;
  DidStatus status = 3;
}

message MsgUpdateDidStatusResponse {}

message MsgRemoveDid {
  string creator = 1;
  string did = 2;
}

message MsgRemoveDidResponse {}

message MsgCreateService {
  string creator = 1;
  string sid = 2;
  string name = 3;
  string description = 4;
  repeated string issuers = 5;
}

message MsgCreateServiceResponse {}

message MsgUpdateServiceStatus {
  string creator = 1;
  string sid = 2;
  ServiceStatus status = 3;
}

message MsgUpdateServiceStatusResponse {}

message MsgRemoveService {
  string creator = 1;
  string sid = 2;
}

message MsgRemoveServiceResponse {}

message MsgCreateVC {
  string issuer = 1;
  string did = 2;
  string sid = 3;
  string hash = 4;
  string uri = 5;
  bytes data = 6;
  repeated bytes filters = 7;
}

message MsgCreateVCResponse {}

message MsgUpdateVC {
  string issuer = 1;
  string did = 2;
  string sid = 3;
  string hash = 4;
  string uri = 5;
  bytes data = 6;
  repeated bytes filters = 7;
}

message MsgUpdateVCResponse {}

message MsgRemoveVC {
  string issuer = 1;
  string did = 2;
  string sid = 3;
}

message MsgRemoveVCResponse {}
