syntax = "proto3";
package metaearth.did;

import "gogoproto/gogo.proto";

option go_package = "github.com/openmetaearth/me-hub/x/did/types";

// credential service status enum
enum ServiceStatus {
  option (gogoproto.goproto_enum_stringer) = true;
  option (gogoproto.goproto_enum_prefix) = false;

  SERVICE_STATUS_INACTIVE = 0 [(gogoproto.enumvalue_customname) = "SERVICE_STATUS_INACTIVE "];
  SERVICE_STATUS_ACTIVE = 1 [(gogoproto.enumvalue_customname) = "SERVICE_STATUS_ACTIVE"];
}

// credential service
message Service {
  string sid = 1;
  string name = 2;
  string description = 3;
  repeated string issuers = 4;
  ServiceStatus status = 5;
}
