syntax = "proto3";
package metaearth.wstaking;

option go_package = "github.com/openmetaearth/me-hub/x/wstaking/types";

message Meid {
  string account = 1;
  string creator = 2;
  string regionId = 3;
  string regionName = 4;
  int32 RewardType = 5;
}

message MeidNFT {
  string creator = 1;
  string account = 2;
  string regionId = 3;
  string regionName = 4;
  // umeid means user meid.
  string umeid = 5;
  string nft_id = 6;
}
