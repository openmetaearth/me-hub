syntax = "proto3";
package metaearth.wstaking;

import "gogoproto/gogo.proto";

option go_package = "github.com/openmetaearth/me-hub/x/wstaking/types";
message Record {
  string recordNumber = 1;
  string url = 2;
  string from = 3;
}
message ReviewRecord {
  string recordHash = 1;
  string actionNumber = 2;
  string recordResult = 3;
  string reviewedAddress = 4;
}
