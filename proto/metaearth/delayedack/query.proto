syntax = "proto3";
package metaearth.delayedack;

import "cosmos/base/query/v1beta1/pagination.proto";
import "gogoproto/gogo.proto";
import "google/api/annotations.proto";
import "metaearth/common/rollapp_packet.proto";
import "metaearth/common/status.proto";
import "metaearth/delayedack/params.proto";

option go_package = "github.com/openmetaearth/me-hub/x/delayedack/types";

// Query defines the gRPC querier service.
service Query {
  // Parameters queries the parameters of the module.
  rpc Params(QueryParamsRequest) returns (QueryParamsResponse) {
    option (google.api.http).get = "/metaearth/delayedack/params";
  }

  // Queries a list of RollappPacket items by rollappID.
  rpc GetPackets(QueryRollappPacketsRequest) returns (QueryRollappPacketListResponse) {
    option (google.api.http).get = "/metaearth/delayedack/packets/{rollappId}/{status}";
  }
}

// QueryParamsRequest is request type for the Query/Params RPC method.
message QueryParamsRequest {}

// QueryParamsResponse is response type for the Query/Params RPC method.
message QueryParamsResponse {
  // params holds all the parameters of this module.
  Params params = 1 [(gogoproto.nullable) = false];
}

message QueryRollappPacketsRequest {
  string rollappId = 1;
  common.Status status = 2;
  common.RollappPacket.Type type = 3;
  cosmos.base.query.v1beta1.PageRequest pagination = 4;
}

message QueryRollappPacketListResponse {
  repeated common.RollappPacket rollappPackets = 1 [(gogoproto.nullable) = false];
  cosmos.base.query.v1beta1.PageResponse pagination = 2;
}
