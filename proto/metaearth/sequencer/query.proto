syntax = "proto3";
package metaearth.sequencer;

import "cosmos/base/query/v1beta1/pagination.proto";
import "gogoproto/gogo.proto";
import "google/api/annotations.proto";
// this line is used by starport scaffolding # 1
import "metaearth/sequencer/operating_status.proto";
import "metaearth/sequencer/params.proto";
import "metaearth/sequencer/sequencer.proto";

option go_package = "github.com/openmetaearth/me-hub/x/sequencer/types";

// Query defines the gRPC querier service.
service Query {
  // Parameters queries the parameters of the module.
  rpc Params(QueryParamsRequest) returns (QueryParamsResponse) {
    option (google.api.http).get = "/metaearth/sequencer/params";
  }
  // Queries a Sequencer by address.
  rpc Sequencer(QueryGetSequencerRequest) returns (QueryGetSequencerResponse) {
    option (google.api.http).get = "/metaearth/sequencer/sequencer/{sequencerAddress}";
  }

  // Queries a list of Sequencer items.
  rpc Sequencers(QuerySequencersRequest) returns (QuerySequencersResponse) {
    option (google.api.http).get = "/metaearth/sequencer/sequencer";
  }

  // Queries a SequencersByRollapp by rollappId.
  rpc SequencersByRollapp(QueryGetSequencersByRollappRequest) returns (QueryGetSequencersByRollappResponse) {
    option (google.api.http).get = "/metaearth/sequencer/sequencers_by_rollapp/{rollappId}";
  }

  // Queries a SequencersByRollappByStatus
  rpc SequencersByRollappByStatus(QueryGetSequencersByRollappByStatusRequest) returns (QueryGetSequencersByRollappByStatusResponse) {
    option (google.api.http).get =
      "/metaearth/sequencer/"
      "sequencers_by_rollapp/{rollappId}/{status}";
  }

  rpc UnConfirmSequencerAddressByRollappByStatus(QueryGetUnConfirmSequencersAddrByRollappRequest) returns (QueryGetUnConfirmSequencersAddrByRollappResponse) {
    option (google.api.http).get =
      "/metaearth/sequencer/"
      "unconfirm_sequencer_address_by_rollapp/{rollappId}/{block_height}";
  }

  rpc ReplaceProposerInfo(QueryReplaceProposerInfoRequest) returns (QueryReplaceProposerInfoResponse) {
    option (google.api.http).post = "/metaearth/sequencer/replace_proposer_info/{rollappId}";
  }

  // this line is used by starport scaffolding # 2
}

// QueryParamsRequest is request type for the Query/Params RPC method.
message QueryParamsRequest {}

// QueryParamsResponse is response type for the Query/Params RPC method.
message QueryParamsResponse {
  // params holds all the parameters of this module.
  Params params = 1 [(gogoproto.nullable) = false];
}

message QueryGetSequencerRequest {
  string sequencerAddress = 1;
}

message QueryGetSequencerResponse {
  Sequencer sequencer = 1 [(gogoproto.nullable) = false];
}

message QuerySequencersRequest {
  cosmos.base.query.v1beta1.PageRequest pagination = 1;
}

message QuerySequencersResponse {
  repeated Sequencer sequencers = 1 [(gogoproto.nullable) = false];
  cosmos.base.query.v1beta1.PageResponse pagination = 2;
}

message QueryGetSequencersByRollappRequest {
  string rollappId = 1;
}

message QueryGetSequencersByRollappResponse {
  repeated Sequencer sequencers = 1 [(gogoproto.nullable) = false];
}

message QueryGetSequencersByRollappByStatusRequest {
  string rollappId = 1;
  OperatingStatus status = 2;
}

message QueryGetSequencersByRollappByStatusResponse {
  repeated Sequencer sequencers = 1 [(gogoproto.nullable) = false];
}

message QueryGetUnConfirmSequencersAddrByRollappRequest {
  string rollappId = 1;
  int64 block_height = 2;
}

message QueryGetUnConfirmSequencersAddrByRollappResponse {
  Sequencer new_sequencer = 1 [(gogoproto.nullable) = false];
  int64 start_height = 2;
  int64 unconfirm_cache_height = 3;
}

message QueryReplaceProposerInfoRequest {
  string rollappId = 1;
}

message QueryReplaceProposerInfoResponse {
  MsgStoreReplaceProposer replace_proposer = 1 [(gogoproto.nullable) = false];
}

