syntax = "proto3";
package metaearth.sequencer;

import "cosmos/base/v1beta1/coin.proto";
import "cosmos/msg/v1/msg.proto";
import "cosmos_proto/cosmos.proto";
import "gogoproto/gogo.proto";
import "google/protobuf/any.proto";
import "google/protobuf/timestamp.proto";
import "metaearth/sequencer/description.proto";
import "metaearth/sequencer/operating_status.proto";

option go_package = "github.com/openmetaearth/me-hub/x/sequencer/types";

// Sequencer defines a sequencer identified by its' address (sequencerAddress).
// The sequencer could be attached to only one rollapp (rollappId).
message Sequencer {
  // sequencerAddress is the bech32-encoded address of the sequencer account
  // which is the account that the message was sent from.
  string sequencerAddress = 1;
  // pubkey is the public key of the sequencers' dymint client, as a Protobuf
  // Any.
  google.protobuf.Any dymintPubKey = 2 [(cosmos_proto.accepts_interface) = "cosmos.crypto.PubKey"];
  // rollappId defines the rollapp to which the sequencer belongs.
  string rollappId = 3;
  // description defines the descriptive terms for the sequencer.
  Description description = 4 [(gogoproto.nullable) = false];

  // jailed defined whether the sequencer has been jailed from bonded status or
  // not.
  bool jailed = 5;

  // proposer defines whether the sequencer is a proposer or not.
  bool proposer = 6;

  // status is the sequencer status (bonded/unbonding/unbonded).
  OperatingStatus status = 7;

  // tokens define the delegated tokens (incl. self-delegation).
  repeated cosmos.base.v1beta1.Coin tokens = 8 [
    (gogoproto.nullable) = false,
    (gogoproto.castrepeated) = "github.com/cosmos/cosmos-sdk/types.Coins"
  ];

  // unbonding_height defines, if unbonding, the height at which this sequencer
  // has begun unbonding.
  int64 unbonding_height = 9;
  // unbond_time defines, if unbonding, the min time for the sequencer to
  // complete unbonding.
  google.protobuf.Timestamp unbond_time = 10 [
    (gogoproto.nullable) = false,
    (gogoproto.stdtime) = true
  ];
}

message MsgRepalceProposer {
  string rollapp_id = 1;
  string old_proposer = 2 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  string new_proposer = 3 [(cosmos_proto.scalar) = "cosmos.AddressString"];
  int64 block_height = 4;
}

message MsgStoreReplaceProposer {
  MsgRepalceProposer replace_proposer = 1 [(gogoproto.nullable) = false];
  int64 hub_block_height = 2;
}
