syntax = "proto3";
package metaearth.wgov;

import "amino/amino.proto";
import "cosmos/base/query/v1beta1/pagination.proto";
import "cosmos/base/v1beta1/coin.proto";
import "cosmos/gov/v1/gov.proto";
import "cosmos/query/v1/query.proto";
import "cosmos_proto/cosmos.proto";
import "gogoproto/gogo.proto";
import "google/api/annotations.proto";

option go_package = "github.com/openmetaearth/me-hub/x/wgov/types";

service Query {
  rpc MeTallyResult(QueryMeTallyResultRequest) returns (QueryMeTallyResultResponse) {
    option (google.api.http).get = "/metaearth/wgov/proposals/{proposal_id}/tally";
  }
}

message QueryMeTallyResultRequest {
  uint64 proposal_id = 1;
}

message QueryMeTallyResultResponse {
  cosmos.gov.v1.TallyResult tally = 1;
}
