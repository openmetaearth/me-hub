syntax = "proto3";

package metaearth.megroup;

import "cosmos/base/query/v1beta1/pagination.proto";
import "gogoproto/gogo.proto";
import "google/api/annotations.proto";
import "metaearth/megroup/group_info.proto";
import "metaearth/megroup/group_member.proto";
import "metaearth/megroup/group_member_count.proto";
import "metaearth/megroup/member_joined.proto";
import "metaearth/megroup/params.proto";

option go_package = "github.com/openmetaearth/me-hub/x/megroup/types";

// Query defines the gRPC querier service.
service Query {
  // Parameters queries the parameters of the module.
  rpc Params(QueryParamsRequest) returns (QueryParamsResponse) {
    option (google.api.http).get = "/me-hub/megroup/params";
  }

  // Queries a list of Group items.
  rpc Group(QueryGetGroupRequest) returns (QueryGetGroupResponse) {
    option (google.api.http).get = "/me-hub/megroup/group_by_id/{id}";
  }
  rpc GroupAll(QueryAllGroupRequest) returns (QueryAllGroupResponse) {
    option (google.api.http).get = "/me-hub/megroup/all_group";
  }
  rpc GroupByMember(QueryGroupByMemberRequest) returns (QueryGetGroupResponse) {
    option (google.api.http).get = "/me-hub/megroup/group_by_address/{address}";
  }

  // Queries a list of GroupMember items.
  rpc GroupMember(QueryGetGroupMemberRequest) returns (QueryGetGroupMemberResponse) {
    option (google.api.http).get = "/me-hub/megroup/group_member/{address}";
  }
  rpc GroupMemberAll(QueryGroupAllMemberRequest) returns (QueryGroupAllMemberResponse) {
    option (google.api.http).get = "/me-hub/megroup/group_all_member/{groupID}";
  }

  // Queries a list of MemberJoined items.
  // rpc MemberJoined    (QueryGetMemberJoinedRequest) returns
  // (QueryGetMemberJoinedResponse) { option (google.api.http).get =
  // "/me-hub/megroup/member_joined/{address}";

  //}
  // rpc MemberJoinedAll (QueryAllMemberJoinedRequest) returns
  // (QueryAllMemberJoinedResponse) {
  // option (google.api.http).get = "/me-hub/megroup/member_joined";

  //}

  // Queries a list of GroupMemberCount items.
  rpc GroupMemberCount(QueryGetGroupMemberCountRequest) returns (QueryGetGroupMemberCountResponse) {
    option (google.api.http).get = "/me-hub/megroup/group_member_count/{groupId}";
  }
  // rpc GroupMemberCountAll (QueryAllGroupMemberCountRequest) returns
  // (QueryAllGroupMemberCountResponse) {
  //   option (google.api.http).get = "/me-hub/megroup/group_member_count";

  //  }
}

// QueryParamsRequest is request type for the Query/Params RPC method.
message QueryParamsRequest {}

// QueryParamsResponse is response type for the Query/Params RPC method.
message QueryParamsResponse {
  // params holds all the parameters of this module.
  Params params = 1 [(gogoproto.nullable) = false];
}

message QueryGetGroupRequest {
  uint64 id = 1;
}

message QueryGetGroupResponse {
  GroupInfo Group = 1 [(gogoproto.nullable) = false];
}

message QueryAllGroupRequest {
  cosmos.base.query.v1beta1.PageRequest pagination = 1;
}

message QueryAllGroupResponse {
  repeated GroupInfo Group = 1 [(gogoproto.nullable) = false];
  cosmos.base.query.v1beta1.PageResponse pagination = 2;
}

message QueryGroupByMemberRequest {
  string address = 1;
}

message QueryGroupByMemberResponse {
  GroupInfo Group = 1 [(gogoproto.nullable) = false];
}

message QueryGetGroupMemberRequest {
  string address = 1;
}

message QueryGetGroupMemberResponse {
  GroupMember GroupMember = 1 [(gogoproto.nullable) = false];
}

message QueryGroupAllMemberRequest {
  uint64 groupID = 1;
  cosmos.base.query.v1beta1.PageRequest pagination = 2;
}

message QueryGroupAllMemberResponse {
  uint64 groupID = 1;
  repeated GroupMember GroupMember = 2 [(gogoproto.nullable) = false];
  cosmos.base.query.v1beta1.PageResponse pagination = 3;
}

message QueryGetMemberJoinedRequest {
  string address = 1;
}

message QueryGetMemberJoinedResponse {
  MemberJoined memberJoined = 1 [(gogoproto.nullable) = false];
}

message QueryAllMemberJoinedRequest {
  cosmos.base.query.v1beta1.PageRequest pagination = 1;
}

message QueryAllMemberJoinedResponse {
  repeated MemberJoined memberJoined = 1 [(gogoproto.nullable) = false];
  cosmos.base.query.v1beta1.PageResponse pagination = 2;
}

message QueryGetGroupMemberCountRequest {
  uint64 groupId = 1;
}

message QueryGetGroupMemberCountResponse {
  uint64 groupMemberCount = 1;
}

message QueryAllGroupMemberCountRequest {
  cosmos.base.query.v1beta1.PageRequest pagination = 1;
}

message QueryAllGroupMemberCountResponse {
  repeated GroupMemberCount groupMemberCount = 1 [(gogoproto.nullable) = false];
  cosmos.base.query.v1beta1.PageResponse pagination = 2;
}
