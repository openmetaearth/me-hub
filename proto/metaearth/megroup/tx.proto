syntax = "proto3";

package metaearth.megroup;

import "cosmos/msg/v1/msg.proto";
import "metaearth/megroup/group_info.proto";

option go_package = "github.com/openmetaearth/me-hub/x/megroup/types";

// Msg defines the Msg service.
service Msg {
  option (cosmos.msg.v1.service) = true;
  rpc CreateGroup(MsgCreateGroup) returns (MsgCreateGroupResponse);
  rpc UpdateGroup(MsgUpdateGroup) returns (MsgUpdateGroupResponse);
  rpc DeleteGroup(MsgDeleteGroup) returns (MsgDeleteGroupResponse);
  rpc JoinGroup(MsgJoinGroup) returns (MsgJoinGroupResponse);
  rpc LeaveGroup(MsgLeaveGroupRequest) returns (MsgLeaveGroupResponse);
}
message MsgCreateGroup {
  option (cosmos.msg.v1.signer) = "creator";
  string creator = 1;
  GroupInfo groupInfo = 2;
}

message MsgCreateGroupResponse {
  uint64 id = 1;
}

message MsgUpdateGroup {
  option (cosmos.msg.v1.signer) = "creator";
  string creator = 1;
  uint64 id = 2;
  GroupInfo groupInfo = 3;
}

message MsgUpdateGroupResponse {}

message MsgDeleteGroup {
  option (cosmos.msg.v1.signer) = "creator";
  string creator = 1;
  uint64 id = 2;
}

message MsgDeleteGroupResponse {}

message MsgJoinGroup {
  option (cosmos.msg.v1.signer) = "creator";
  string creator = 1;
  uint64 groupId = 2;
  string applicantAddress = 3;
}

message MsgJoinGroupResponse {}

message MsgLeaveGroupRequest {
  option (cosmos.msg.v1.signer) = "creator";
  string creator = 1;
  uint64 groupId = 2;
}

message MsgLeaveGroupResponse {}
