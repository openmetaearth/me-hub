syntax = "proto3";
package metaearth.eibc;

import "gogoproto/gogo.proto";
import "metaearth/eibc/demand_order.proto";
import "metaearth/eibc/params.proto";

option go_package = "github.com/openmetaearth/me-hub/x/eibc/types";

// GenesisState defines the eibc module's genesis state.
message GenesisState {
  Params params = 1 [(gogoproto.nullable) = false];
  repeated DemandOrder demand_orders = 2 [(gogoproto.nullable) = false];
}
