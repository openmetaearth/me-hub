syntax = "proto3";
package metaearth.gravity.v1;

import "cosmos/base/query/v1beta1/pagination.proto";
import "cosmos/base/v1beta1/coin.proto";
import "cosmos_proto/cosmos.proto";
import "gogoproto/gogo.proto";
import "google/api/annotations.proto";
import "google/protobuf/any.proto";
import "metaearth/gravity/v1/tx.proto";
import "metaearth/gravity/v1/types.proto";

option go_package = "github.com/openmetaearth/me-hub/x/gravity/types";

// Query defines the gRPC querier service
service Query {
  rpc Params(QueryParamsRequest) returns (QueryParamsResponse) {
    option (google.api.http).get = "/gravity/v1/params";
  }
  rpc CurrentRelayerSet(QueryCurrentRelayerSetRequest) returns (QueryCurrentRelayerSetResponse) {
    option (google.api.http).get = "/gravity/v1/current_relayer_set";
  }
  rpc RelayerSetRequest(QueryRelayerSetRequestRequest) returns (QueryRelayerSetRequestResponse) {
    option (google.api.http).get = "/gravity/v1/relayer_set_request";
  }
  rpc RelayerSetConfirm(QueryRelayerSetConfirmRequest) returns (QueryRelayerSetConfirmResponse) {
    option (google.api.http).get = "/gravity/v1/relayer_set_confirm";
  }
  rpc RelayerSetConfirmsByNonce(QueryRelayerSetConfirmsByNonceRequest) returns (QueryRelayerSetConfirmsByNonceResponse) {
    option (google.api.http).get = "/gravity/v1/relayer_set_confirms_by_nonce";
  }
  rpc LastRelayerSetRequests(QueryLastRelayerSetRequestsRequest) returns (QueryLastRelayerSetRequestsResponse) {
    option (google.api.http).get = "/gravity/v1/last_relayer_set_requests";
  }
  rpc LastPendingRelayerSetRequestByAddr(QueryLastPendingRelayerSetRequestByAddrRequest) returns (QueryLastPendingRelayerSetRequestByAddrResponse) {
    option (google.api.http).get = "/gravity/v1/last_pending_relayer_set_request_by_addr";
  }
  rpc LastPendingBatchRequestByAddr(QueryLastPendingBatchRequestByAddrRequest) returns (QueryLastPendingBatchRequestByAddrResponse) {
    option (google.api.http).get = "/gravity/v1/last_pending_batch_request_by_addr";
  }
  rpc LastEventNonceByAddr(QueryLastEventNonceByAddrRequest) returns (QueryLastEventNonceByAddrResponse) {
    option (google.api.http).get = "/gravity/v1/last_event_nonce_by_addr";
  }
  rpc LastEventBlockHeightByAddr(QueryLastEventBlockHeightByAddrRequest) returns (QueryLastEventBlockHeightByAddrResponse) {
    option (google.api.http).get = "/gravity/v1/last_event_block_height_by_addr";
  }
  rpc LastObservedBlockHeight(QueryLastObservedBlockHeightRequest) returns (QueryLastObservedBlockHeightResponse) {
    option (google.api.http).get = "/gravity/v1/last_observed_block_height";
  }
  rpc OutgoingTxBatches(QueryOutgoingTxBatchesRequest) returns (QueryOutgoingTxBatchesResponse) {
    option (google.api.http).get = "/gravity/v1/outgoing_tx_batches";
  }
  rpc BatchFees(QueryBatchFeeRequest) returns (QueryBatchFeeResponse) {
    option (google.api.http).get = "/gravity/v1/batch_fees";
  }
  rpc BatchRequestByNonce(QueryBatchRequestByNonceRequest) returns (QueryBatchRequestByNonceResponse) {
    option (google.api.http).get = "/gravity/v1/batch_request_by_nonce";
  }
  rpc BatchConfirm(QueryBatchConfirmRequest) returns (QueryBatchConfirmResponse) {
    option (google.api.http).get = "/gravity/v1/batch_confirm";
  }
  rpc BatchConfirms(QueryBatchConfirmsRequest) returns (QueryBatchConfirmsResponse) {
    option (google.api.http).get = "/gravity/v1/batch_confirms";
  }
  rpc Relayer(QueryRelayerRequest) returns (QueryRelayerResponse) {
    option (google.api.http).get = "/gravity/v1/relayer";
  }
  // Validators queries all relayer that match the given status.
  rpc Relayers(QueryRelayersRequest) returns (QueryRelayersResponse) {
    option (google.api.http).get = "/gravity/v1/relayers";
  }
  rpc ProposalRelayers(QueryProposalRelayersRequest) returns (QueryProposalRelayersResponse) {
    option (google.api.http).get = "/gravity/v1/proposal_relayers";
  }
  rpc PendingOutgoingTxByAddr(QueryPendingOutgoingTxByAddrRequest) returns (QueryPendingOutgoingTxByAddrResponse) {
    option (google.api.http).get = "/gravity/v1/pending_outgoing_tx_by_addr";
  }
  rpc UnbatchedTxs(QueryUnbatchedTxsRequest) returns (QueryUnbatchedTxsResponse) {
    option (google.api.http).get = "/gravity/v1/unbatched_txs";
  }
  rpc ProjectedBatchTimeoutHeight(QueryProjectedBatchTimeoutHeightRequest) returns (QueryProjectedBatchTimeoutHeightResponse) {
    option (google.api.http).get = "/gravity/v1/projected_batch_timeout_height";
  }
  rpc BridgeTokens(QueryBridgeTokensRequest) returns (QueryBridgeTokensResponse) {
    option (google.api.http).get = "/gravity/v1/bridge_tokens";
  }
  rpc BridgeToken(QueryBridgeTokenRequest) returns (QueryBridgeTokenResponse) {
    option (google.api.http).get = "/gravity/v1/bridge_token";
  }
  rpc BridgeChainList(QueryBridgeChainListRequest) returns (QueryBridgeChainListResponse) {
    option (google.api.http).get = "/gravity/v1/bridge_chain_list";
  }
  // ClaimsByEventNonce queries all claims for a given event nonce, normally only one claim for one nonce,
  // if relayers have bug, there's will be more than one claim.
  rpc ClaimsByEventNonce(QueryClaimsByEventNonceRequest) returns (QueryClaimsByEventNonceResponse) {
    option (google.api.http).get = "/gravity/v1/claims_by_event_nonce";
  }
  rpc LastObservedRelayer(QueryLastObservedRelayer) returns (QueryLastObservedRelayerResponse) {
    option (google.api.http).get = "/gravity/v1/last_observed_relayer";
  }
}

message QueryParamsRequest {
  string chain_name = 1;
}
message QueryParamsResponse {
  Params params = 1 [(gogoproto.nullable) = false];
}

message QueryCurrentRelayerSetRequest {
  string chain_name = 1;
}
message QueryCurrentRelayerSetResponse {
  RelayerSet relayer_set = 1;
}

message QueryRelayerSetRequestRequest {
  string chain_name = 1;
  uint64 nonce = 2;
}
message QueryRelayerSetRequestResponse {
  RelayerSet relayer_set = 1;
}

message QueryRelayerSetConfirmRequest {
  string chain_name = 1;
  string relayer_address = 2;
  uint64 nonce = 3;
}
message QueryRelayerSetConfirmResponse {
  MsgRelayerSetConfirm confirm = 1;
}

message QueryRelayerSetConfirmsByNonceRequest {
  string chain_name = 1;
  uint64 nonce = 2;
}
message QueryRelayerSetConfirmsByNonceResponse {
  repeated MsgRelayerSetConfirm confirms = 1;
}

message QueryLastRelayerSetRequestsRequest {
  string chain_name = 1;
  cosmos.base.query.v1beta1.PageRequest pagination = 2;
}
message QueryLastRelayerSetRequestsResponse {
  repeated RelayerSet relayer_sets = 1;
  cosmos.base.query.v1beta1.PageResponse pagination = 2;
}

message QueryLastPendingRelayerSetRequestByAddrRequest {
  string chain_name = 1;
  string relayer_address = 2;
  cosmos.base.query.v1beta1.PageRequest pagination = 3;
}
message QueryLastPendingRelayerSetRequestByAddrResponse {
  repeated RelayerSet relayer_sets = 1;
  cosmos.base.query.v1beta1.PageResponse pagination = 2;
}

message QueryLastPendingBatchRequestByAddrRequest {
  string chain_name = 1;
  string relayer_address = 2;
}
message QueryLastPendingBatchRequestByAddrResponse {
  OutgoingTxBatch batch = 1;
}

message QueryOutgoingTxBatchesRequest {
  string chain_name = 1;
  cosmos.base.query.v1beta1.PageRequest pagination = 2;
}
message QueryOutgoingTxBatchesResponse {
  repeated OutgoingTxBatch batches = 1;
  cosmos.base.query.v1beta1.PageResponse pagination = 2;
}

message QueryBatchRequestByNonceRequest {
  string chain_name = 1;
  string token_contract = 2;
  uint64 nonce = 3;
}
message QueryBatchRequestByNonceResponse {
  OutgoingTxBatch batch = 1;
}

message QueryBatchConfirmRequest {
  string chain_name = 1;
  string token_contract = 2;
  string relayer_address = 3;
  uint64 nonce = 4;
}
message QueryBatchConfirmResponse {
  MsgConfirmBatch confirm = 1;
}

message QueryBatchConfirmsRequest {
  string chain_name = 1;
  string token_contract = 2;
  uint64 nonce = 3;
}
message QueryBatchConfirmsResponse {
  repeated MsgConfirmBatch confirms = 1;
}

message QueryLastEventNonceByAddrRequest {
  string chain_name = 1;
  string relayer_address = 2;
}
message QueryLastEventNonceByAddrResponse {
  uint64 event_nonce = 1;
}

message QueryRelayerRequest {
  string chain_name = 1;
  string relayer_address = 2;
  string external_address = 3;
}
message QueryRelayerResponse {
  Relayer relayer = 1;
}

message QueryPendingOutgoingTxByAddrRequest {
  string chain_name = 1;
  string sender_address = 2;
}
message QueryPendingOutgoingTxByAddrResponse {
  repeated OutgoingTransferTx transfers_in_batches = 1;
  repeated OutgoingTransferTx unbatched_transfers = 2;
}

message QueryUnbatchedTxsRequest {
  string chain_name = 1;
  string token_contract = 2; // Optional filter by token contract address
  cosmos.base.query.v1beta1.PageRequest pagination = 3;
}
message QueryUnbatchedTxsResponse {
  repeated OutgoingTransferTx txs = 1;
  cosmos.base.query.v1beta1.PageResponse pagination = 2;
}

message QueryLastObservedBlockHeightRequest {
  string chain_name = 1;
}
message QueryLastObservedBlockHeightResponse {
  uint64 external_block_height = 1;
  uint64 block_height = 2;
  uint64 last_observed_event_nonce = 3;
}

message QueryLastEventBlockHeightByAddrRequest {
  string chain_name = 1;
  string relayer_address = 2;
}
message QueryLastEventBlockHeightByAddrResponse {
  uint64 block_height = 1;
}

message QueryRelayersRequest {
  string chain_name = 1;
}
message QueryRelayersResponse {
  // relayers contains all the queried relayers.
  repeated Relayer relayers = 1 [(gogoproto.nullable) = false];
}

message QueryProposalRelayersRequest {
  string chain_name = 1;
}
message QueryProposalRelayersResponse {
  ProposalRelayer proposal_relayer = 1 [(gogoproto.nullable) = false];
}

message QueryProjectedBatchTimeoutHeightRequest {
  string chain_name = 1;
}
message QueryProjectedBatchTimeoutHeightResponse {
  uint64 timeout_height = 1;
  uint64 projectedCurrentExternalHeight = 2;
}

message QueryBridgeTokensRequest {
  string chain_name = 1;
  cosmos.base.query.v1beta1.PageRequest pagination = 2;
}
message QueryBridgeTokensResponse {
  repeated BridgeToken bridge_tokens = 1;
  cosmos.base.query.v1beta1.PageResponse pagination = 2;
}

message QueryBridgeTokenRequest {
  string chain_name = 1;
  string denom = 2;
  string contract_address = 3;
}
message QueryBridgeTokenResponse {
  BridgeToken bridge_token = 1;
  cosmos.base.v1beta1.Coin total_supply = 2 [(gogoproto.nullable) = false];
}

message QueryBridgeChainListRequest {}
message QueryBridgeChainListResponse {
  repeated string chain_names = 1;
}

message QueryBatchFeeRequest {
  string chain_name = 1;
  repeated MinBatchFee min_batch_fees = 2 [(gogoproto.nullable) = false];
}
message QueryBatchFeeResponse {
  repeated BatchFees batch_fees = 1;
}

message QueryClaimsByEventNonceRequest {
  string chain_name = 1;
  uint64 event_nonce = 2;
}
message QueryClaimsByEventNonceResponse {
  repeated Attestation claims = 1 [(gogoproto.nullable) = false];
}
message QueryLastObservedRelayer {
  string chain_name = 1;
}
message QueryLastObservedRelayerResponse {
  RelayerSet relayer_set = 1;
}
