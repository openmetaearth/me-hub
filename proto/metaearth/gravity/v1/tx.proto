syntax = "proto3";
package metaearth.gravity.v1;

import "cosmos/base/v1beta1/coin.proto";
import "cosmos/msg/v1/msg.proto";
import "cosmos_proto/cosmos.proto";
import "gogoproto/gogo.proto";
import "metaearth/gravity/v1/types.proto";

option go_package = "github.com/openmetaearth/me-hub/x/gravity/types";

// Msg defines the state transitions possible within gravity
service Msg {
  rpc BondedRelayer(MsgBondedRelayer) returns (MsgBondedRelayerResponse);
  rpc AddDelegate(MsgAddDelegate) returns (MsgAddDelegateResponse);
  rpc UnbondedRelayer(MsgUnbondedRelayer) returns (MsgUnbondedRelayerResponse);

  rpc RelayerSetConfirm(MsgRelayerSetConfirm) returns (MsgRelayerSetConfirmResponse);
  rpc RelayerSetUpdateClaim(MsgRelayerSetUpdateClaim) returns (MsgRelayerSetUpdateClaimResponse);

  rpc SendToMeClaim(MsgSendToMeClaim) returns (MsgSendToMeClaimResponse);
  rpc BridgeTokenClaim(MsgBridgeTokenClaim) returns (MsgBridgeTokenClaimResponse);

  rpc SendToExternal(MsgSendToExternal) returns (MsgSendToExternalResponse);
  rpc CancelSendToExternal(MsgCancelSendToExternal) returns (MsgCancelSendToExternalResponse);
  rpc SendToExternalClaim(MsgSendToExternalClaim) returns (MsgSendToExternalClaimResponse);
  rpc RequestBatch(MsgRequestBatch) returns (MsgRequestBatchResponse);
  rpc ConfirmBatch(MsgConfirmBatch) returns (MsgConfirmBatchResponse);

  // UpdateParams defines a governance operation for updating the x/gravity module
  // parameters. The authority is hard-coded to the x/gov module account.
  rpc UpdateParams(MsgUpdateParams) returns (MsgUpdateParamsResponse);

  rpc IncreaseBridgeFee(MsgIncreaseBridgeFee) returns (MsgIncreaseBridgeFeeResponse);
  rpc ProposalRelayers(MsgProposalRelayers) returns (MsgProposalRelayersResponse);
}

message MsgBondedRelayer {
  string chain_name = 1;
  string relayer_address = 2;
  string external_address = 3;
  cosmos.base.v1beta1.Coin delegate_amount = 4 [(gogoproto.nullable) = false];
}

message MsgBondedRelayerResponse {}

message MsgAddDelegate {
  string chain_name = 1;
  string relayer_address = 2;
  cosmos.base.v1beta1.Coin amount = 3 [(gogoproto.nullable) = false];
}

message MsgAddDelegateResponse {}

message MsgUnbondedRelayer {
  string chain_name = 1;
  string relayer_address = 2;
}

message MsgUnbondedRelayerResponse {}

// MsgRelayerSetConfirm
// this is the message sent by the validators when they wish to submit their
// signatures over the validator set at a given block height. A validator must
// first call MsgSetEthAddress to set their Ethereum address to be used for
// signing. Then someone (anyone) must make a RelayerSetRequest, the request is
// essentially a messaging mechanism to determine which block all validators
// should submit signatures over. Finally validators sign the validator set,
// powers, and Ethereum addresses of the entire validator set at the height of a
// RelayerSetRequest and submit that signature with this message.
//
// If a sufficient number of validators (66% of voting power) (A) have set
// Ethereum addresses and (B) submit RelayerSetConfirm messages with their
// signatures it is then possible for anyone to view these signatures in the
// chain store and submit them to Ethereum to update the validator set
// -------------
message MsgRelayerSetConfirm {
  uint64 nonce = 1;
  string relayer_address = 2;
  string external_address = 3;
  string signature = 4;
  string chain_name = 5;
}

message MsgRelayerSetConfirmResponse {}

// This informs the Cosmos module that a relayer set has been updated.
message MsgRelayerSetUpdateClaim {
  uint64 event_nonce = 1;
  uint64 block_height = 2;
  uint64 relayer_set_nonce = 3;
  repeated BridgeValidator members = 4 [(gogoproto.nullable) = false];
  string relayer_address = 6;
  string chain_name = 7;
}

message MsgRelayerSetUpdateClaimResponse {}

// MsgSendToMeClaim
// When more than 66% of the active validator set has
// claimed to have seen the deposit enter the bsc blockchain coins are
// issued to the Payment address in question
// -------------
message MsgSendToMeClaim {
  uint64 event_nonce = 1;
  uint64 block_height = 2;
  string token_contract = 3;
  string amount = 4 [
    (gogoproto.customtype) = "github.com/cosmos/cosmos-sdk/types.Int",
    (gogoproto.nullable) = false
  ];
  string sender = 5;
  string receiver = 6;
  string relayer_address = 7;
  string chain_name = 8;
}

message MsgSendToMeClaimResponse {}

// MsgSendToExternal
// This is the message that a user calls when they want to bridge an asset
// it will later be removed when it is included in a batch and successfully
// submitted tokens are removed from the users balance immediately
// -------------
// AMOUNT:
// the coin to send across the bridge, note the restriction that this is a
// single coin not a set of coins that is normal in other Payment messages
// FEE:
// the fee paid for the bridge, distinct from the fee paid to the chain to
// actually send this message in the first place. So a successful send has
// two layers of fees for the user
message MsgSendToExternal {
  string sender = 1;
  string dest = 2;
  cosmos.base.v1beta1.Coin amount = 3 [(gogoproto.nullable) = false];
  cosmos.base.v1beta1.Coin bridge_fee = 4 [(gogoproto.nullable) = false];
  string chain_name = 5;
}

message MsgSendToExternalResponse {
  uint64 outgoing_tx_id = 1;
}

// This call allows the sender (and only the sender)
// to cancel a given MsgSendToExternal and recieve a refund
// of the tokens
message MsgCancelSendToExternal {
  uint64 transaction_id = 1;
  string sender = 2;
  string chain_name = 3;
}

message MsgCancelSendToExternalResponse {}

// MsgRequestBatch
// this is a message anyone can send that requests a batch of transactions to
// send across the bridge be created for whatever block height this message is
// included in. This acts as a coordination point, the handler for this message
// looks at the AddToOutgoingPool tx's in the store and generates a batch, also
// available in the store tied to this message. The validators then grab this
// batch, sign it, submit the signatures with a MsgConfirmBatch before a relayer
// can finally submit the batch
// -------------
// feeReceive:
message MsgRequestBatch {
  string sender = 1;
  string denom = 2;
  string minimum_fee = 3 [
    (gogoproto.customtype) = "github.com/cosmos/cosmos-sdk/types.Int",
    (gogoproto.nullable) = false
  ];
  string fee_receive = 4;
  string chain_name = 5;
  string base_fee = 6 [
    (gogoproto.customtype) = "github.com/cosmos/cosmos-sdk/types.Int",
    (gogoproto.nullable) = false
  ];
}

message MsgRequestBatchResponse {
  uint64 batch_nonce = 1;
}

// MsgConfirmBatch
// When validators observe a MsgRequestBatch they form a batch by ordering
// transactions currently in the txqueue in order of highest to lowest fee,
// cutting off when the batch either reaches a hardcoded maximum size (to be
// decided, probably around 100) or when transactions stop being profitable
// (determine this without nondeterminism) This message includes the batch
// as well as an Bsc signature over this batch by the validator
// -------------
message MsgConfirmBatch {
  uint64 nonce = 1;
  string token_contract = 2;
  string relayer_address = 3;
  string external_address = 4;
  string signature = 5;
  string chain_name = 6;
}

message MsgConfirmBatchResponse {}

// SendToExternalClaim claims that a batch of withdrawal
// operations on the bridge contract was executed.
message MsgSendToExternalClaim {
  uint64 event_nonce = 1;
  uint64 block_height = 2;
  uint64 batch_nonce = 3;
  string token_contract = 4;
  string relayer_address = 5;
  string chain_name = 6;
}

message MsgSendToExternalClaimResponse {}

message MsgBridgeTokenClaim {
  uint64 event_nonce = 1;
  uint64 block_height = 2;
  string token_contract = 3;
  string name = 4;
  string symbol = 5;
  uint64 decimals = 6;
  string relayer_address = 7;
  string chain_name = 8;
}

message MsgBridgeTokenClaimResponse {}

// MsgUpdateParams is the Msg/UpdateParams request type.
message MsgUpdateParams {
  string chain_name = 1;
  option (cosmos.msg.v1.signer) = "authority";

  // authority is the address of the governance account.
  string authority = 2 [(cosmos_proto.scalar) = "cosmos.AddressString"];

  // params defines the x/gravity parameters to update.
  //
  // NOTE: All parameters must be supplied.
  Params params = 3 [(gogoproto.nullable) = false];
}

// MsgUpdateParamsResponse defines the response structure for executing a
// MsgUpdateParams message.
message MsgUpdateParamsResponse {}

message MsgIncreaseBridgeFee {
  string chain_name = 1;
  uint64 transaction_id = 2;
  string sender = 3;
  cosmos.base.v1beta1.Coin add_bridge_fee = 4 [(gogoproto.nullable) = false];
}

message MsgIncreaseBridgeFeeResponse {}

message MsgProposalRelayers {
  string chain_name = 1;
  option (cosmos.msg.v1.signer) = "authority";

  // authority is the address of the governance account.
  string authority = 2 [(cosmos_proto.scalar) = "cosmos.AddressString"];

  repeated string relayers = 3;
}

message MsgProposalRelayersResponse {}
