syntax = "proto3";
package metaearth.sponsorship;

import "gogoproto/gogo.proto";
import "metaearth/sponsorship/sponsorship.proto";

option go_package = "github.com/st-chain/me-hub/x/sponsorship/types";

// GenesisState defines the sponsorship module's genesis state.
message GenesisState {
  // Params defines params for x/sponsorship module.
