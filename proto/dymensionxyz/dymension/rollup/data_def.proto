syntax = "proto3";
package dymensionxyz.dymension.rollup;

import "gogoproto/gogo.proto";

option go_package = "github.com/st-chain/me-hub/x/rollup/types";

message MsgStakeInfo{
  uint64 stakeAmount = 1;
  uint64 applyUnStakeAmount = 2;
}

message ElectionNodeStatus{
  string address = 1 ;
  uint64 stakeAmount = 2 ;
  int32  status =3 ;
  bytes bondNodeAddress = 4;
}
