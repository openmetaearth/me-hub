syntax = "proto3";

package dymensionxyz.dymension.wdistri;

import "dymensionxyz/dymension/wdistri/params.proto";

option go_package = "github.com/st-chain/me-hub/x/wdistri/types";

// Msg defines the Msg service.
service Msg {
  rpc UpdateParams (MsgUpdateParams) returns (MsgUpdateParamsResponse);
}
message MsgUpdateParams {
  string authority = 1;
  Params params    = 2;
}

message MsgUpdateParamsResponse {}

